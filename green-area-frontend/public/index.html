<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e8e3e" />
    <meta
      name="description"
      content="Green Area Analysis — แดชบอร์ดวิเคราะห์พื้นที่สีเขียว NDVI / LST / Urban Coverage ของประเทศไทย"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Green Area Analysis · Thailand</title>
    <script>
      // Apply the saved/preferred colour theme before first paint (no flash).
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved === 'dark' ||
            (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var t = dark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.colorScheme = t;
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
