# Security headers for the static frontend (Netlify).
# CSP is ENFORCED. Directives match what the app actually loads:
#   script-src 'self'            — no inline scripts (runtime externalised via
#                                  INLINE_RUNTIME_CHUNK=false; theme-init.js is a file)
#   style-src ... fonts.googleapis.com — Google Fonts stylesheet (landing cover)
#   font-src  ... fonts.gstatic.com    — Google Fonts woff2 files
#   'unsafe-inline' style        — maplibre-gl / deck.gl inject inline styles
#   img/connect https:           — basemap tiles (cartocdn) + GEE tiles + backend API
#   worker-src blob:             — maplibre-gl web workers
# If you add a new external origin (CDN, analytics…), add it here or it WILL be blocked.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https:; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
