name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: green-area-backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: green-area-backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Lint root utility scripts (ruff)
        working-directory: .
        run: ruff check capture_screenshots.py generate_proposal_pdf.py generate_user_flow_diagram.py
      - name: Run tests
        run: pytest tests/ -v
      # Dependency vulnerability scan — informational for now (continue-on-error).
      # Flip to blocking by removing continue-on-error once advisories are triaged.
      - name: Audit dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

  frontend:
    name: Frontend tests (react-scripts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: green-area-frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: green-area-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npx eslint src --ext .js --max-warnings 0
      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true
