[pytest]
testpaths = tests

# Starlette 1.2's TestClient nudges httpx → httpx2, but our pinned httpx 0.28 is
# required by the rest of the stack (supabase, etc.) and works fine. Silence the
# cosmetic StarletteDeprecationWarning (a UserWarning, not DeprecationWarning) so
# test output stays clean. Matched by message; `.` stands in for the backticks.
filterwarnings =
    ignore:Using .httpx. with .starlette.testclient. is deprecated:UserWarning
