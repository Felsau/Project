<!-- @dsCard group="Type" viewport="700x170" name="Data mono — IBM Plex Mono" subtitle="Every figure, coordinate and unit is tabular mono" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); display: flex; flex-direction: column; gap: 12px; }
  .figure { display: flex; align-items: baseline; gap: var(--s-2); }
  .figure__num { font-family: var(--mono); font-size: 30px; font-weight: var(--w-semibold); color: var(--text-strong); font-variant-numeric: tabular-nums; }
  .figure__unit { font-family: var(--mono); font-size: var(--t-sm); color: var(--text-muted); }
  .row { display: flex; gap: 36px; }
  .small { font-family: var(--mono); font-size: var(--t-sm); color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .lab { font-size: var(--t-xs); letter-spacing: var(--track-label); text-transform: uppercase; color: var(--text-muted); font-weight: var(--w-semibold); margin-bottom: 3px; font-family: var(--sans); }
</style>
</head>
<body>
  <div class="row">
    <div class="figure"><span class="figure__num">0.412</span><span class="figure__unit">NDVI</span></div>
    <div class="figure"><span class="figure__num">34.6</span><span class="figure__unit">°C LST</span></div>
    <div class="figure"><span class="figure__num">12.8</span><span class="figure__unit">m² / person</span></div>
  </div>
  <div class="row">
    <div><div class="lab">Coordinates</div><div class="small">13.7563° N, 100.5018° E</div></div>
    <div><div class="lab">Scene</div><div class="small">S2A_MSIL2A_20260214</div></div>
  </div>
</body>
</html>
