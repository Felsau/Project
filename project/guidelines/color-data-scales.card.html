<!-- @dsCard group="Colors" viewport="700x200" name="Data scales" subtitle="NDVI greens, LST heat ramp, AI priority — encodings, not brand colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-app); display: flex; flex-direction: column; gap: 14px; }
  .scale { display: grid; grid-template-columns: 64px 1fr; align-items: center; gap: 14px; }
  .key { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; }
  .bar { height: 26px; border-radius: var(--rad-sm); border: 1px solid rgba(0,0,0,0.06); }
  .ticks { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-top: 4px; }
</style>
</head>
<body>
  <div class="scale">
    <div class="key">NDVI</div>
    <div>
      <div class="bar" style="background:var(--grad-ndvi)"></div>
      <div class="ticks"><span>0.30</span><span>0.45</span><span>0.60</span><span>+</span></div>
    </div>
  </div>
  <div class="scale">
    <div class="key">LST</div>
    <div>
      <div class="bar" style="background:var(--grad-lst)"></div>
      <div class="ticks"><span>&lt;28°C</span><span>33°C</span><span>38°C</span><span>+</span></div>
    </div>
  </div>
  <div class="scale">
    <div class="key">Priority</div>
    <div>
      <div class="bar" style="background:var(--grad-prio)"></div>
      <div class="ticks"><span>Low</span><span></span><span></span><span>Urgent</span></div>
    </div>
  </div>
</body>
</html>
