<!-- @dsCard group="Colors" viewport="700x150" name="Semantic states" subtitle="Warning and critical — surfaced only when the data demands it" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 60px; border-radius: var(--rad); border: 1px solid rgba(0,0,0,0.05); }
  .name { font-size: var(--t-sm); font-weight: 600; color: var(--text-strong); margin-top: 9px; }
  .var { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--warn)"></div><div class="name">Warn</div><div class="var">--warn</div></div>
    <div class="sw"><div class="chip" style="background:var(--warn-soft)"></div><div class="name">Warn soft</div><div class="var">--warn-soft</div></div>
    <div class="sw"><div class="chip" style="background:var(--crit)"></div><div class="name">Critical</div><div class="var">--crit</div></div>
    <div class="sw"><div class="chip" style="background:var(--crit-soft)"></div><div class="name">Critical soft</div><div class="var">--crit-soft</div></div>
  </div>
</body>
</html>
