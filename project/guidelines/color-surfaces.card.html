<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & rules" subtitle="Paper grounds and hairline borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 60px; border-radius: var(--rad); border: 1px solid var(--rule); }
  .name { font-size: var(--t-sm); font-weight: 600; color: var(--text-strong); margin-top: 9px; }
  .var { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="name">Paper</div><div class="var">--paper</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="name">Paper 2</div><div class="var">--paper-2</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="name">Surface</div><div class="var">--surface</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface);border-color:var(--rule)"></div><div class="name">Rule</div><div class="var">--rule</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface);border-color:var(--rule-2);border-width:2px"></div><div class="name">Rule 2</div><div class="var">--rule-2</div></div>
  </div>
</body>
</html>
