<!-- @dsCard group="Colors" viewport="700x140" name="Ink scale" subtitle="Neutral text→fill ramp, 0 strongest → 8 subtlest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 58px; border-radius: var(--rad-sm); border: 1px solid var(--rule); }
  .lab { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-top: 7px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-0)"></div><div class="lab">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-1)"></div><div class="lab">1</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="lab">2</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="lab">3</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-4)"></div><div class="lab">4</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-5)"></div><div class="lab">5</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-6)"></div><div class="lab">6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-7)"></div><div class="lab">7</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-8)"></div><div class="lab">8</div></div>
  </div>
</body>
</html>
