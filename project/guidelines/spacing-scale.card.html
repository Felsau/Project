<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing scale" subtitle="4px base — dense instrument-panel rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 26px; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 2px; }
  .lab { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="lab">s-1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="lab">s-2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="lab">s-3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="lab">s-4·16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="lab">s-5·20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="lab">s-6·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="lab">s-8·32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="lab">s-10·40</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="lab">s-12·48</div></div>
  </div>
</body>
</html>
