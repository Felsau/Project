<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); display: flex; flex-direction: column; gap: 10px; }
  .display { font-size: var(--t-2xl); font-weight: var(--w-bold); letter-spacing: var(--track-display); color: var(--text-strong); line-height: var(--lh-tight); }
  .title { font-size: var(--t-lg); font-weight: var(--w-semibold); color: var(--text-strong); }
  .body { font-size: var(--t-base); color: var(--text-body); line-height: var(--lh-body); max-width: 56ch; }
  .meta { font-size: var(--t-xs); letter-spacing: var(--track-eyebrow); text-transform: uppercase; font-weight: var(--w-semibold); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="meta">Section eyebrow · 11.5 / 600 / tracked</div>
  <div class="display">Green space, measured — พื้นที่สีเขียว</div>
  <div class="title">District vegetation summary — 17 / 600</div>
  <div class="body">Satellite-derived vegetation index for all 50 districts, updated each season from Sentinel-2 imagery. — 13.5 / 400 / 1.6</div>
</body>
</html>
