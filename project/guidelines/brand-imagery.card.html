<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-app); }
  .row { display: flex; gap: 12px; }
  .shot { flex: 1; border: 1px solid var(--rule); border-radius: var(--rad); overflow: hidden; background: var(--surface-card); }
  .shot img { display: block; width: 100%; height: 190px; object-fit: cover; object-position: top left; }
</style>
</head>
<body>
  <div class="row">
    <div class="shot"><img src="../assets/img/dashboard-stats.jpg" alt="Statistics dashboard"></div>
    <div class="shot"><img src="../assets/img/dashboard-recommend.jpg" alt="AI recommendation map"></div>
    <div class="shot"><img src="../assets/img/report-pdf.png" alt="Exported PDF report"></div>
  </div>
</body>
</html>
