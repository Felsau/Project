<!-- @dsCard group="Colors" viewport="700x150" name="Brand accent" subtitle="One verdant green, used sparingly for emphasis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: var(--rad); border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: var(--t-sm); font-weight: 600; color: var(--text-strong); margin-top: 9px; }
  .hex { font-family: var(--mono); font-size: var(--t-xs); color: var(--text-muted); margin-top: 2px; }
  .var { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">Accent</div><div class="hex">#1F6F43</div><div class="var">--accent</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-strong)"></div><div class="name">Accent strong</div><div class="hex">#145232</div><div class="var">--accent-strong</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="name">Accent soft</div><div class="hex">#E8F0EB</div><div class="var">--accent-soft</div></div>
  </div>
</body>
</html>
