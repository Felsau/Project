<!-- @dsCard group="Brand" viewport="700x160" name="Logo" subtitle="Diamond mark + wordmark lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .cell { flex: 1; border: 1px solid var(--rule); border-radius: var(--rad); display: flex; align-items: center; justify-content: center; padding: 22px; background: var(--surface-card); }
  .cell.dark { background: var(--ink-0); }
  .lockup { display: flex; align-items: center; gap: 10px; }
  .word { font-size: 19px; font-weight: var(--w-bold); letter-spacing: var(--track-display); color: var(--text-strong); }
  .dark .word { color: #f4f7f5; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="lockup"><img src="../assets/logo/mark.svg" width="28" height="28" alt=""><span class="word">GreenLens</span></div></div>
    <div class="cell"><img src="../assets/logo/mark.svg" width="40" height="40" alt="GreenLens mark"></div>
    <div class="cell dark"><div class="lockup"><img src="../assets/logo/mark.svg" width="28" height="28" alt=""><span class="word">GreenLens</span></div></div>
  </div>
</body>
</html>
