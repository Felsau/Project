<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); display: flex; flex-direction: column; gap: 8px; }
  .h { font-family: var(--report); font-size: 22px; font-weight: 700; color: var(--text-strong); }
  .p { font-family: var(--report); font-size: 14px; color: var(--text-body); line-height: 1.7; max-width: 58ch; }
  .note { font-size: var(--t-xs); color: var(--text-faint); font-family: var(--sans); }
</style>
</head>
<body>
  <div class="h">รายงานพื้นที่สีเขียว — เขตปทุมวัน</div>
  <div class="p">ดัชนีพืชพรรณ (NDVI) เฉลี่ย 0.412 อุณหภูมิพื้นผิว 34.6°C ข้อมูลจากดาวเทียม Sentinel-2 ประมวลผลรายฤดูกาล</div>
  <div class="note">Sarabun 400 / 700 · used only in PDF report exports</div>
</body>
</html>
