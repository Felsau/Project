<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & elevation" subtitle="Small radii, hairline rules; shadows only on floating UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .box { flex: 1; height: 86px; background: var(--surface-card); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
  .lab { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
  .name { font-size: var(--t-sm); font-weight: 600; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius:var(--rad-sm)"><div class="name">3px</div><div class="lab">--rad-sm</div></div>
    <div class="box" style="border-radius:var(--rad)"><div class="name">5px</div><div class="lab">--rad</div></div>
    <div class="box" style="border-radius:var(--rad-lg)"><div class="name">8px</div><div class="lab">--rad-lg</div></div>
    <div class="box" style="border-radius:var(--rad);border:none;box-shadow:var(--shadow-control)"><div class="name">Control</div><div class="lab">--shadow-control</div></div>
    <div class="box" style="border-radius:var(--rad-lg);border:none;box-shadow:var(--shadow-card)"><div class="name">Card lift</div><div class="lab">--shadow-card</div></div>
  </div>
</body>
</html>
